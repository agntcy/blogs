name: PR Preview

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "url=https://blogs.agntcy.org/drafts/$SAFE/" >> "$GITHUB_OUTPUT"

      - name: Keep only PR-changed posts
        run: |
          # Find _posts/ files added or modified in this PR vs the base branch
          CHANGED=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- '_posts/')
          if [ -z "$CHANGED" ]; then
            echo "No _posts changes in this PR."
          else
            echo "Keeping: $CHANGED"
          fi
          # Remove every post that is NOT in the PR diff
          for f in _posts/*.md; do
            if ! echo "$CHANGED" | grep -qF "$f"; then
              rm "$f"
            fi
          done

      - name: Setup Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 0

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "/drafts/${{ steps.branch.outputs.safe }}"
        env:
          JEKYLL_ENV: production

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: drafts/${{ steps.branch.outputs.safe }}
          keep_files: true

      - name: Regenerate drafts index
        run: |
          # Check out gh-pages so we can list all preview dirs and update the index
          git fetch origin gh-pages
          git checkout gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cat > drafts/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>AGNTCY Blogs – PR Previews</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              h1 { font-size: 1.5rem; }
              ul { line-height: 2; }
              a { color: #0070f3; }
            </style>
          </head>
          <body>
            <h1>PR Previews</h1>
            <p>One entry per open pull request. Each link shows only the post(s) added in that PR.</p>
            <ul>
          HTMLEOF

          for dir in drafts/*/; do
            [ -d "$dir" ] || continue
            NAME=$(basename "$dir")
            echo "    <li><a href=\"/drafts/$NAME/\">$NAME</a></li>" >> drafts/index.html
          done

          cat >> drafts/index.html << 'HTMLEOF'
            </ul>
            <p><a href="/">← Back to blog</a></p>
          </body>
          </html>
          HTMLEOF

          git add drafts/index.html
          git diff --cached --quiet || git commit -m "chore: update drafts index for ${{ github.head_ref }}"
          git push origin gh-pages

      - name: Find existing preview comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pr-preview -->'

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- pr-preview -->
            ## Blog preview

            Preview deployed to: ${{ steps.branch.outputs.url }}

            _Last updated: commit `${{ github.sha }}`_
